<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bankr Communities</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #0a0a0f; overflow: hidden; }
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #8888a0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      background: #0a0a0f;
      z-index: 2;
    }
    #loading.hidden { display: none; }
    #app {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    #app.ready { opacity: 1; }
    .footer-note {
      position: fixed;
      bottom: 8px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 11px;
      color: #55556a;
      pointer-events: none;
      z-index: 1;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div>Loading Bankr Communities…</div>
    <div style="font-size:12px;">Full site · Bankr wallet sign-in</div>
  </div>
  <iframe id="app" title="Bankr Communities" allow="clipboard-write"></iframe>
  <div class="footer-note">made with love &lt;3 rayblanco.eth · v12</div>

  <script>
    var SITE = 'https://bankr-community.vercel.app';
    var frame = document.getElementById('app');
    var loading = document.getElementById('loading');

    function pathFromHash() {
      var hash = window.location.hash || '';
      if (hash.indexOf('#/') === 0) return hash.slice(1);
      return '/';
    }

    function buildFrameUrl() {
      var path = pathFromHash();
      var join = path.indexOf('?') >= 0 ? '&' : '?';
      return SITE + path + join + 'embed=bankr';
    }

    function sendWallet() {
      if (!frame.contentWindow) return;
      var wallet = null;
      var authenticated = false;
      if (typeof bankr !== 'undefined') {
        authenticated = !!(bankr.auth && bankr.auth.isAuthenticated);
        wallet =
          (bankr.ctx && bankr.ctx.walletAddress) ||
          (bankr.wallet && (bankr.wallet.address || bankr.wallet.evmAddress)) ||
          null;
      }
      frame.contentWindow.postMessage(
        {
          type: 'BANKR_WALLET',
          address: wallet,
          authenticated: authenticated,
        },
        SITE
      );
    }

    async function handleRequireSignIn() {
      if (typeof bankr === 'undefined' || !bankr.auth) return;
      try {
        await bankr.auth.requireSignIn();
      } catch (err) {
        console.warn('Bankr sign-in cancelled or failed', err);
      }
      sendWallet();
    }

    window.addEventListener('message', function (event) {
      if (event.origin !== SITE) return;
      var data = event.data || {};
      if (data.type === 'BANKR_EMBED_READY') sendWallet();
      if (data.type === 'BANKR_REQUIRE_SIGNIN') handleRequireSignIn();
    });

    window.addEventListener('hashchange', function () {
      loading.classList.remove('hidden');
      frame.classList.remove('ready');
      frame.src = buildFrameUrl();
    });

    function onFrameLoad() {
      loading.classList.add('hidden');
      frame.classList.add('ready');
      sendWallet();
    }

    function boot() {
      frame.onload = onFrameLoad;
      frame.src = buildFrameUrl();
    }

    if (typeof bankr !== 'undefined') {
      bankr.on('ready', function () {
        boot();
        bankr.on('refresh', sendWallet);
      });
      setTimeout(function () {
        if (!frame.src) boot();
      }, 1500);
    } else {
      loading.innerHTML =
        '<div>Bankr SDK not loaded</div><div style="font-size:12px;">Open from the Bankr terminal Apps panel.</div>';
    }
  </script>
</body>
</html>
